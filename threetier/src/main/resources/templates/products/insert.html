<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>상품 등록</title>
</head>
<body>
<form th:action="@{/products/insert-ok}" method="post" th:object="${productVO}">
    <div>
        <input type="text" th:field="*{productName}"  placeholder="상품 이름" />
    </div>
    <div>
        <input type="text" th:field="*{productPrice}" placeholder="상품 가격" />
    </div>
    <div>
        <input type="text" th:field="*{productStock}" placeholder="상품 재고" />
    </div>
    <div>
        <input type="text" th:field="*{productBrand}" placeholder="상품 브랜드" />
    </div>
    <div>
        <button>상품 등록</button>
    </div>
</form>
</body>
<script>
    const inputs = document.querySelectorAll('input');
    const btn = document.querySelector('button');
    const form = document.querySelector('form');

    btn.addEventListener('click', () => {
        for(let input of inputs){
            if(!input.value)return alert(input.name + "값이 없습니다.")
        }
        form.submit();
    })
</script>
</html>
