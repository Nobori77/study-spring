<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>게시글 수정</title>
</head>
<body>
<form th:action="@{/posts/update}" method="post" th:object="${post}">
    <input type="hidden" th:field="*{id}" value="*{id}">
    <input type="text" th:field="*{postTitle}" th:value="*{PostTitle}" placeholder="제목을 입력하세요" />
    <input type="text" th:field="*{postContent}" th:value="*{PostContent}" placeholder="내용을 입력하세요" />
    <button type="submit">게시글 수정</button>
</form>
</body>
</html>
