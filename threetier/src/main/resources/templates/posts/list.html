<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>게시판 목록</title>
    <style>
        table {
            width: 800px;
            border-collapse: collapse;
            margin: 30px auto;
        }

        h1 {
            text-align: center;
        }

        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }

        a {
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>
<h1>게시판 목록</h1>
    <th:block th:if="${#lists.size(posts) != 0}">
        <table>
            <tr>
                <th>번호</th>
                <th>제목</th>
                <th>작성자</th>
                <th>조회수</th>
            </tr>
            <th:block th:each="post: ${posts}">
                <tr th:object="${post}">
                    <td th:text="*{id}"></td>
                    <td>
                        <a th:href="@{/posts/read(id=*{id})}" th:text="*{postTitle}"></a>
                    </td>
                    <td th:text="*{postContent}"></td>
                    <td th:text="*{postReadCount}"></td>
                </tr>
            </th:block>
        </table>
    </th:block>
    <th:block th:unless="${#lists.size(posts) !=0}">
        <h1>게시글이 없습니다</h1>
    </th:block>
</body>
</html>
